version: "3.8"

services:
  fuseki:
    image: stain/jena-fuseki
    ports:
      - "3030:3030"
    environment:
      - FUSEKI_DATASET_1=football
      - FUSEKI_DATASET_1_TYPE=tdb2

      - FUSEKI_DATASET_1_LOCATION=/fuseki/databases/football
      - FUSEKI_INIT_DATA=/data/football.ttl

    volumes:
      - ./rdf:/data
      - ./db:/fuseki/databases

